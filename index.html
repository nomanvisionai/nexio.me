<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXIO - Premium Private Messenger</title>
    
    <!-- ================= APP ICON LINK ================= -->
    <link rel="icon" href="assets/icon.png" type="image/png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* স্প্ল্যাশ স্ক্রিনের স্মুথ অ্যানিমেশন */
        .fade-out {
            opacity: 0;
            transition: opacity 0.5s ease-out;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-slate-100 h-screen w-screen flex justify-center items-center font-sans overflow-hidden relative">

    <!-- ================= PREMIUM SPLASH SCREEN ================= -->
    <div id="splash-screen" class="fixed inset-0 bg-slate-900 z-[100] flex flex-col justify-center items-center select-none">
        <!-- আপনার আপলোড করা loading.png ছবি -->
        <img src="assets/loading.png" alt="Nexio Loading" class="w-32 h-32 md:w-40 md:h-40 object-contain mb-4 animate-pulse">
        <div class="w-12 h-1 bg-indigo-500 rounded-full overflow-hidden">
            <div class="w-full h-full bg-white origin-left animate-[loading_1.5s_infinite_ease-in-out]"></div>
        </div>
        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-4">Securing Connection...</p>
    </div>
    
    <style>
        @keyframes loading {
            0% { transform: scaleX(0); }
            50% { transform: scaleX(1); }
            100% { transform: scaleX(0); transform-origin: right; }
        }
    </style>

    <!-- ================= TOAST ALERT ================= -->
    <div id="custom-alert" class="hidden fixed top-5 max-w-sm w-full mx-4 z-50 p-4 rounded-lg shadow-xl text-white font-medium flex items-center justify-between transition-all duration-300">
        <span id="alert-text"></span>
    </div>

    <!-- ================= FRIEND'S PROFILE MODAL ================= -->
    <div id="profile-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex justify-center items-center p-4">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-xs text-center relative">
            <h3 class="text-xl font-bold text-slate-800 mb-4">User Profile</h3>
            <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex justify-center items-center text-3xl font-bold mx-auto mb-3" id="modal-avatar">U</div>
            <h4 class="text-lg font-bold text-slate-700" id="modal-name">Name</h4>
            <p class="text-sm text-indigo-600 font-medium mb-2" id="modal-username">@username</p>
            <p class="text-xs text-slate-500 bg-slate-100 py-1 px-2 rounded-md inline-block mb-3" id="modal-email">email@gmail.com</p>
            <div class="text-sm text-slate-600 border-t pt-3 mb-4" id="modal-dob-box">
                🎂 Birthday: <span id="modal-dob" class="font-semibold">Hidden</span>
            </div>
            <button id="close-profile-btn" class="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 py-2 rounded-lg font-medium transition cursor-pointer">Close</button>
        </div>
    </div>

    <!-- ================= MY SETTINGS / EDIT PROFILE MODAL ================= -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex justify-center items-center p-4">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-md relative overflow-y-auto max-h-[90vh]">
            <h3 class="text-2xl font-black text-slate-800 mb-4 border-b pb-2">Edit Profile Settings</h3>
            
            <form id="edit-profile-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 uppercase">First Name</label>
                        <input type="text" id="edit-firstname" required class="mt-1 block w-full p-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 uppercase">Last Name</label>
                        <input type="text" id="edit-lastname" required class="mt-1 block w-full p-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase">Username</label>
                    <div class="flex mt-1">
                        <span class="bg-slate-100 border border-r-0 border-slate-200 p-2 text-slate-500 rounded-l-lg font-bold">@</span>
                        <input type="text" id="edit-username" required class="block w-full p-2 border border-slate-200 rounded-r-lg outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <p id="edit-username-status" class="text-xs mt-1 font-semibold"></p>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase">Date of Birth</label>
                    <input type="date" id="edit-dob" required class="mt-1 block w-full p-2 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                <div class="flex gap-2 pt-2">
                    <button type="button" id="close-settings-btn" class="w-1/2 bg-slate-200 hover:bg-slate-300 text-slate-700 py-2.5 rounded-lg font-bold transition cursor-pointer">Cancel</button>
                    <button type="submit" id="save-settings-btn" class="w-1/2 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-lg font-bold transition shadow-md cursor-pointer">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ================= AUTH CONTAINER ================= -->
    <div id="auth-container" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md mx-4 overflow-y-auto max-h-[95vh] z-10">
        <div class="text-center mb-6">
            <h2 class="text-4xl font-black text-indigo-600 tracking-wider">NEXIO</h2>
            <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest font-bold">Instantly Private Chatting</p>
        </div>
        
        <form id="auth-form" class="space-y-4">
            <div id="signup-fields" class="hidden space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 uppercase">First Name</label>
                        <input type="text" id="auth-firstname" class="mt-1 block w-full p-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 uppercase">Last Name</label>
                        <input type="text" id="auth-lastname" class="mt-1 block w-full p-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase">Username</label>
                    <div class="flex mt-1">
                        <span class="bg-slate-100 border border-r-0 border-slate-200 p-2.5 text-slate-500 rounded-l-xl font-bold">@</span>
                        <input type="text" id="auth-username" placeholder="username" class="block w-full p-2.5 border border-slate-200 rounded-r-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <p id="signup-username-status" class="text-xs mt-1 font-semibold"></p>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase">Date of Birth</label>
                    <input type="date" id="auth-dob" class="mt-1 block w-full p-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase">Email Address</label>
                <input type="email" id="auth-email" required class="mt-1 block w-full p-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase">Password</label>
                <input type="password" id="auth-password" required class="mt-1 block w-full p-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <button type="submit" id="auth-btn" class="w-full bg-indigo-600 text-white p-3 rounded-xl hover:bg-indigo-700 transition font-bold shadow-md cursor-pointer">
                <span id="btn-text">Login</span>
            </button>
        </form>

        <p class="mt-4 text-sm text-center text-slate-500">
            <span id="auth-toggle-text">Don't have an account?</span> 
            <button id="auth-toggle-btn" class="text-indigo-600 font-bold hover:underline focus:outline-none cursor-pointer">Sign Up</button>
        </p>
    </div>

    <!-- ================= MAIN MESSENGER CHAT WINDOW ================= -->
    <div id="chat-container" class="hidden bg-white w-full h-screen md:h-[90vh] md:max-w-5xl md:rounded-2xl shadow-2xl flex flex-col md:flex-row overflow-hidden z-10">
        
        <!-- SIDEBAR -->
        <div class="w-full md:w-80 border-r border-slate-100 flex flex-col bg-slate-50 h-[42vh] md:h-full">
            <!-- Self Profile Control Bar -->
            <div class="p-4 bg-indigo-600 text-white flex justify-between items-center shadow-sm">
                <div class="flex items-center gap-2 cursor-pointer hover:opacity-80 transition" id="open-settings-trigger">
                    <div class="w-8 h-8 bg-indigo-700 rounded-full flex justify-center items-center font-bold text-xs border border-indigo-400" id="my-avatar">M</div>
                    <div class="flex flex-col">
                        <span id="my-name" class="font-bold text-sm truncate max-w-[120px]">My Name</span>
                        <span class="text-[10px] text-indigo-200 font-medium">Click to edit profile</span>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <label class="inline-flex items-center cursor-pointer scale-75 origin-right">
                        <input type="checkbox" id="my-dob-privacy" class="sr-only peer" checked>
                        <div class="relative w-9 h-5 bg-indigo-400 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500"></div>
                        <span class="ms-1 text-xs font-bold text-indigo-100">DOB</span>
                    </label>
                    <button id="logout-btn" class="bg-rose-500 hover:bg-rose-600 px-2.5 py-1.5 rounded-lg text-xs font-bold transition cursor-pointer">Logout</button>
                </div>
            </div>

            <!-- Global Lookup Engine Inputs -->
            <div class="p-3 border-b border-slate-200/60 bg-white">
                <input type="text" id="search-friend" placeholder="Search email or username (without @)..." class="w-full p-2.5 text-sm bg-slate-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-transparent">
            </div>

            <!-- Active Contacts Navigation Container -->
            <div id="friends-list" class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- Contacts will render here -->
            </div>
        </div>

        <!-- MAIN MESSAGE DESK AREA -->
        <div class="flex-1 flex flex-col h-[58vh] md:h-full bg-slate-50">
            <!-- Fallback Blank State View -->
            <div id="no-chat-screen" class="flex-1 flex flex-col justify-center items-center bg-slate-50 text-slate-400">
                <div class="w-16 h-16 bg-slate-200 text-slate-400 rounded-full flex justify-center items-center text-3xl mb-2">💬</div>
                <p class="text-sm font-semibold">Select a friend or search to chat</p>
            </div>

            <!-- Conversation Box UI -->
            <div id="active-chat-screen" class="hidden flex-1 flex flex-col h-full bg-white relative">
                <!-- Header -->
                <div class="p-4 bg-white border-b border-slate-100 flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-indigo-600 text-white font-bold rounded-full flex justify-center items-center text-sm" id="chat-header-avatar">U</div>
                        <div>
                            <h3 id="chat-title" class="font-bold text-slate-800 text-sm">Friend Name</h3>
                            <p id="chat-subtitle" class="text-xs text-slate-400">@username</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button id="view-profile-btn" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-3 py-1.5 rounded-lg text-xs font-bold transition cursor-pointer">View Profile</button>
                        <button id="friend-action-btn" class="px-3 py-1.5 rounded-lg text-xs font-bold transition cursor-pointer">Add Friend</button>
                    </div>
                </div>

                <!-- Messages Container -->
                <div id="messages-box" class="flex-1 p-4 overflow-y-auto space-y-3 bg-slate-50/50">
                    <!-- Messaging bubbles injector -->
                </div>

                <!-- Footer Input Area -->
                <form id="message-form" class="p-3 bg-white border-t border-slate-100 flex gap-2 items-center">
                    <input type="text" id="message-input" placeholder="Type a private message instantly..." required class="flex-1 p-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition">
                    <button type="submit" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl hover:bg-indigo-700 transition font-bold text-sm shadow-md cursor-pointer">Send</button>
                </form>
            </div>
        </div>
    </div>

    <!-- ================= CORE MESSENGER CONTROL MATRIX ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc, addDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Setup Firebase Configurations
        const firebaseConfig = {
            apiKey: "AIzaSyDtSFzvut2KqYAaSFeT9DevRC75rqtICwA",
            authDomain: "nexio-chat-daf43.firebaseapp.com",
            projectId: "nexio-chat-daf43",
            storageBucket: "nexio-chat-daf43.firebasestorage.app",
            messagingSenderId: "634019961859",
            appId: "1:634019961859:web:88f4a8c581dc7cfe2c8236"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Capture Nodes
        const authContainer = document.getElementById('auth-container');
        const chatContainer = document.getElementById('chat-container');
        const authForm = document.getElementById('auth-form');
        const signupFields = document.getElementById('signup-fields');
        const authFirstName = document.getElementById('auth-firstname');
        const authLastName = document.getElementById('auth-lastname');
        const authUsername = document.getElementById('auth-username');
        const authDob = document.getElementById('auth-dob');
        const authEmail = document.getElementById('auth-email');
        const authPassword = document.getElementById('auth-password');
        const authBtn = document.getElementById('auth-btn');
        const btnText = document.getElementById('btn-text');
        const authToggleText = document.getElementById('auth-toggle-text');
        const authToggleBtn = document.getElementById('auth-toggle-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const myNameDisplay = document.getElementById('my-name');
        const myAvatar = document.getElementById('my-avatar');
        const myDobPrivacyToggle = document.getElementById('my-dob-privacy');
        const searchFriendInput = document.getElementById('search-friend');
        const friendsListContainer = document.getElementById('friends-list');
        const noChatScreen = document.getElementById('no-chat-screen');
        const activeChatScreen = document.getElementById('active-chat-screen');
        const chatTitle = document.getElementById('chat-title');
        const chatSubtitle = document.getElementById('chat-subtitle');
        const chatHeaderAvatar = document.getElementById('chat-header-avatar');
        const viewProfileBtn = document.getElementById('view-profile-btn');
        const friendActionBtn = document.getElementById('friend-action-btn');
        const messagesBox = document.getElementById('messages-box');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const customAlert = document.getElementById('custom-alert');
        const alertText = document.getElementById('alert-text');
        
        // Modal Links
        const profileModal = document.getElementById('profile-modal');
        const closeProfileBtn = document.getElementById('close-profile-btn');
        const modalAvatar = document.getElementById('modal-avatar');
        const modalName = document.getElementById('modal-name');
        const modalUsername = document.getElementById('modal-username');
        const modalEmail = document.getElementById('modal-email');
        const modalDob = document.getElementById('modal-dob');

        // Settings Elements
        const settingsModal = document.getElementById('settings-modal');
        const openSettingsTrigger = document.getElementById('open-settings-trigger');
        const closeSettingsBtn = document.getElementById('close-settings-btn');
        const editProfileForm = document.getElementById('edit-profile-form');
        const editFirstName = document.getElementById('edit-firstname');
        const editLastName = document.getElementById('edit-lastname');
        const editUsername = document.getElementById('edit-username');
        const editDob = document.getElementById('edit-dob');
        const signupUsernameStatus = document.getElementById('signup-username-status');
        const editUsernameStatus = document.getElementById('edit-username-status');

        let isLoginMode = true;
        let unsubscribeMessages = null;
        let unsubscribeFriends = null;
        let currentUserData = null;
        let activeChatUser = null;
        let myFriendsUids = []; 

        // স্প্ল্যাশ স্ক্রিন কন্ট্রোল লজিক (৩ সেকেন্ড পর বন্ধ হবে)
        window.addEventListener('DOMContentLoaded', () => {
            const splash = document.getElementById('splash-screen');
            setTimeout(() => {
                splash.classList.add('fade-out');
                setTimeout(() => splash.remove(), 500); // মেমোরি খালি করতে পেজ থেকে মুছে ফেলা
            }, 3000); // ৩০০০ মিলি-সেকেন্ড = ৩ সেকেন্ড
        });

        function showToast(message, type = "success") {
            alertText.innerText = message;
            customAlert.className = `fixed top-5 max-w-sm w-full mx-4 z-50 p-4 rounded-xl shadow-xl text-white font-bold flex items-center justify-between transition-all duration-300 ${
                type === "success" ? "bg-emerald-500 shadow-emerald-100" : "bg-rose-500 shadow-rose-100"
            }`;
            customAlert.classList.remove('hidden');
            setTimeout(() => customAlert.classList.add('hidden'), 3000);
        }

        // Live Realtime Username Availability Engine
        async function checkUsernameLive(usernameVal, statusElement) {
            const cleanUser = usernameVal.trim().toLowerCase().replace('@', '');
            if(!cleanUser) {
                statusElement.innerText = "";
                return false;
            }
            const q = query(collection(db, "users"), where("username", "==", `@${cleanUser}`));
            const snap = await getDocs(q);
            
            // If checking from settings panel, bypass matching own current username
            let isOwnName = false;
            if (currentUserData && `@${cleanUser}` === currentUserData.username) {
                isOwnName = true;
            }

            if (!snap.empty && !isOwnName) {
                statusElement.innerText = "❌ Username already exists!";
                statusElement.className = "text-xs mt-1 font-semibold text-rose-500";
                return false;
            } else {
                statusElement.innerText = "✅ Username available!";
                statusElement.className = "text-xs mt-1 font-semibold text-emerald-500";
                return true;
            }
        }

        authUsername.addEventListener('input', () => checkUsernameLive(authUsername.value, signupUsernameStatus));
        editUsername.addEventListener('input', () => checkUsernameLive(editUsername.value, editUsernameStatus));

        // Toggle configuration
        authToggleBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authForm.reset();
            signupUsernameStatus.innerText = "";
            if (isLoginMode) {
                signupFields.classList.add('hidden');
                toggleSignupRequirements(false);
                btnText.innerText = "Login";
                authToggleText.innerText = "Don't have an account?";
                authToggleBtn.innerText = "Sign Up";
            } else {
                signupFields.classList.remove('hidden');
                toggleSignupRequirements(true);
                btnText.innerText = "Sign Up";
                authToggleText.innerText = "Already have an account?";
                authToggleBtn.innerText = "Login";
            }
        });

        function toggleSignupRequirements(required) {
            if(required) {
                authFirstName.setAttribute('required', 'true');
                authLastName.setAttribute('required', 'true');
                authUsername.setAttribute('required', 'true');
                authDob.setAttribute('required', 'true');
            } else {
                authFirstName.removeAttribute('required');
                authLastName.removeAttribute('required');
                authUsername.removeAttribute('required');
                authDob.removeAttribute('required');
            }
        }

        // Authentication Core Pipeline Forms Handles
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = authEmail.value.trim();
            const password = authPassword.value;

            authBtn.disabled = true;
            btnText.innerText = "Processing...";

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                    showToast("Welcome Back!", "success");
                } else {
                    const firstName = authFirstName.value.trim();
                    const lastName = authLastName.value.trim();
                    let username = authUsername.value.trim().toLowerCase().replace('@', '');
                    const dob = authDob.value;
                    const fullName = `${firstName} ${lastName}`;

                    const isAvailable = await checkUsernameLive(username, signupUsernameStatus);
                    if(!isAvailable) throw new Error("username-taken");

                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    await updateProfile(user, { displayName: fullName });

                    await setDoc(doc(db, "users", user.uid), {
                        firstName, lastName, fullName,
                        username: `@${username}`,
                        dob, email, showDob: true,
                        createdAt: serverTimestamp()
                    });

                    showToast("Account Created Successfully!", "success");
                    await signInWithEmailAndPassword(auth, email, password);
                }
                authForm.reset();
                signupUsernameStatus.innerText = "";
            } catch (error) {
                if (error.message === "username-taken") {
                    showToast("Username already taken!", "error");
                } else if (error.code === "auth/email-already-in-use") {
                    showToast("Account already exists with this email!", "error");
                } else if (error.code === "auth/invalid-credential" || error.code === "auth/wrong-password") {
                    showToast("Password or Email wrong!", "error");
                } else {
                    showToast(error.message, "error");
                }
            } finally {
                authBtn.disabled = false;
                btnText.innerText = isLoginMode ? "Login" : "Sign Up";
            }
        });

        logoutBtn.addEventListener('click', () => signOut(auth));

        // Core Listeners Loop
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                authContainer.classList.add('hidden');
                chatContainer.classList.remove('hidden');
                
                // Track current user live modifications changes
                onSnapshot(doc(db, "users", user.uid), (snapshot) => {
                    if(snapshot.exists()) {
                        currentUserData = snapshot.data();
                        myNameDisplay.innerText = currentUserData.fullName;
                        myAvatar.innerText = currentUserData.fullName.charAt(0).toUpperCase();
                        myDobPrivacyToggle.checked = currentUserData.showDob !== false;
                    }
                });

                listenToMyFriendsList();
            } else {
                authContainer.classList.remove('hidden');
                chatContainer.classList.add('hidden');
                if (unsubscribeMessages) unsubscribeMessages();
                if (unsubscribeFriends) unsubscribeFriends();
                friendsListContainer.innerHTML = '';
                currentUserData = null;
                activeChatUser = null;
                myFriendsUids = [];
                noChatScreen.classList.remove('hidden');
                activeChatScreen.classList.add('hidden');
            }
        });

        // Sync visibility settings preferences
        myDobPrivacyToggle.addEventListener('change', async () => {
            if(!auth.currentUser) return;
            await updateDoc(doc(db, "users", auth.currentUser.uid), { showDob: myDobPrivacyToggle.checked });
        });

        // Listen to Friends Document relations
        function listenToMyFriendsList() {
            const q = query(collection(db, "friends"), where("myUid", "==", auth.currentUser.uid));
            unsubscribeFriends = onSnapshot(q, async (snapshot) => {
                myFriendsUids = [];
                friendsListContainer.innerHTML = '';
                
                snapshot.forEach((docNode) => {
                    myFriendsUids.push(docNode.data().friendUid);
                });

                if(myFriendsUids.length === 0 && !searchFriendInput.value.trim()) {
                    friendsListContainer.innerHTML = `<div class="text-center text-xs text-slate-400 mt-4">Search friends to add them</div>`;
                    return;
                }

                if(!searchFriendInput.value.trim()) {
                    // Populate sidebar list with actual added contacts
                    for (const fUid of myFriendsUids) {
                        const fDoc = await getDoc(doc(db, "users", fUid));
                        if(fDoc.exists()) {
                            const uData = fDoc.data();
                            uData.uid = fDoc.id;
                            createFriendItemRow(uData, true);
                        }
                    }
                }
            });
        }

        // Global User Directory Database Search Engine
        searchFriendInput.addEventListener('input', async () => {
            const searchVal = searchFriendInput.value.trim().toLowerCase().replace('@', '');
            if(!searchVal) {
                listenToMyFriendsList();
                return;
            }

            const usersRef = collection(db, "users");
            const allSnap = await getDocs(usersRef);
            friendsListContainer.innerHTML = '';

            let matches = 0;
            allSnap.forEach((docSnapshot) => {
                const uData = docSnapshot.data();
                uData.uid = docSnapshot.id;

                if(uData.uid === auth.currentUser.uid) return;

                const matchEmail = uData.email.toLowerCase().includes(searchVal);
                const matchUser = uData.username.toLowerCase().includes(searchVal);

                if(matchEmail || matchUser) {
                    const isAlreadyFriend = myFriendsUids.includes(uData.uid);
                    createFriendItemRow(uData, isAlreadyFriend);
                    matches++;
                }
            });

            if(matches === 0) {
                friendsListContainer.innerHTML = `<div class="text-center text-xs text-slate-400 mt-4">No users found</div>`;
            }
        });

        function createFriendItemRow(userData, isFriend) {
            const row = document.createElement('div');
            row.className = `flex items-center justify-between p-2.5 rounded-xl hover:bg-indigo-50/70 transition cursor-pointer ${activeChatUser && activeChatUser.uid === userData.uid ? 'bg-indigo-50' : ''}`;
            
            const avatarLetter = userData.fullName.charAt(0).toUpperCase();
            row.innerHTML = `
                <div class="flex items-center gap-3 min-w-0 flex-1">
                    <div class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-full flex justify-center items-center font-bold text-sm flex-shrink-0">${avatarLetter}</div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-slate-800 text-sm truncate">${userData.fullName}</h4>
                        <p class="text-xs text-slate-400 truncate">${userData.username} ${isFriend ? '• <span class="text-indigo-500 font-medium">Friend</span>' : ''}</p>
                    </div>
                </div>
            `;

            row.addEventListener('click', () => {
                openPrivateChatWindow(userData);
                document.querySelectorAll('#friends-list > div').forEach(el => el.classList.remove('bg-indigo-50'));
                row.classList.add('bg-indigo-50');
            });
            friendsListContainer.appendChild(row);
        }

        function openPrivateChatWindow(targetFriendUser) {
            activeChatUser = targetFriendUser;
            noChatScreen.classList.add('hidden');
            activeChatScreen.classList.remove('hidden');

            chatTitle.innerText = activeChatUser.fullName;
            chatSubtitle.innerText = activeChatUser.username;
            chatHeaderAvatar.innerText = activeChatUser.fullName.charAt(0).toUpperCase();

            updateFriendActionButtonState();
            loadPrivateRoomMessagesChannel();
        }

        // WhatsApp Style Add/Remove Friend State Processor Engine 
        function updateFriendActionButtonState() {
            const isFriend = myFriendsUids.includes(activeChatUser.uid);
            if (isFriend) {
                friendActionBtn.innerText = "Remove Friend";
                friendActionBtn.className = "bg-rose-50 hover:bg-rose-100 text-rose-600 px-3 py-1.5 rounded-lg text-xs font-bold transition cursor-pointer";
            } else {
                friendActionBtn.innerText = "Add Friend";
                friendActionBtn.className = "bg-emerald-50 hover:bg-emerald-100 text-emerald-600 px-3 py-1.5 rounded-lg text-xs font-bold transition cursor-pointer";
            }
        }

        friendActionBtn.addEventListener('click', async () => {
            if(!activeChatUser) return;
            const isFriend = myFriendsUids.includes(activeChatUser.uid);
            
            try {
                if(isFriend) {
                    // Remove Relationship Loop
                    const q = query(collection(db, "friends"), where("myUid", "==", auth.currentUser.uid), where("friendUid", "==", activeChatUser.uid));
                    const snap = await getDocs(q);
                    snap.forEach(async (d) => await deleteDoc(doc(db, "friends", d.id)));
                    showToast("Removed from friend list", "success");
                } else {
                    // Add Relationship Map Record
                    await addDoc(collection(db, "friends"), {
                        myUid: auth.currentUser.uid,
                        friendUid: activeChatUser.uid
                    });
                    showToast("Added to friend list!", "success");
                }
                setTimeout(() => updateFriendActionButtonState(), 400);
            } catch(e) {
                showToast("Action execution failed", "error");
            }
        });

        // Message Dispatch Loop
        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgText = messageInput.value.trim();
            if (!msgText || !activeChatUser) return;
            messageInput.value = '';

            try {
                const chatId = [auth.currentUser.uid, activeChatUser.uid].sort().join('_');
                await addDoc(collection(db, "messages"), {
                    chatId, text: msgText,
                    senderUid: auth.currentUser.uid,
                    recipientUid: activeChatUser.uid,
                    createdAt: serverTimestamp()
                });
            } catch (error) {
                showToast("Failed to send message.", "error");
            }
        });

        function loadPrivateRoomMessagesChannel() {
            if (unsubscribeMessages) unsubscribeMessages();
            messagesBox.innerHTML = '';

            const currentRoomChatSignatureId = [auth.currentUser.uid, activeChatUser.uid].sort().join('_');
            const q = query(collection(db, "messages"), where("chatId", "==", currentRoomChatSignatureId), orderBy("createdAt", "asc"));
            
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                messagesBox.innerHTML = '';
                snapshot.forEach((docNode) => {
                    const msg = docNode.data();
                    const isMe = msg.senderUid === auth.currentUser.uid;

                    const msgRow = document.createElement('div');
                    msgRow.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;

                    const bubble = document.createElement('div');
                    bubble.className = `max-w-xs md:max-w-md px-4 py-2 rounded-2xl text-sm shadow-sm ${
                        isMe ? 'bg-indigo-600 text-white rounded-br-none' : 'bg-white text-slate-800 rounded-bl-none border border-slate-100'
                    }`;
                    bubble.innerText = msg.text;

                    msgRow.appendChild(bubble);
                    messagesBox.appendChild(msgRow);
                });
                messagesBox.scrollTop = messagesBox.scrollHeight;
            });
        }

        // Target Friends Profiles View Inspector Overlay
        viewProfileBtn.addEventListener('click', async () => {
            if(!activeChatUser) return;
            const docSnap = await getDoc(doc(db, "users", activeChatUser.uid));
            if(docSnap.exists()){
                const fData = docSnap.data();
                modalAvatar.innerText = fData.fullName.charAt(0).toUpperCase();
                modalName.innerText = fData.fullName;
                modalUsername.innerText = fData.username;
                modalEmail.innerText = fData.email;
                modalDob.innerText = fData.showDob !== false ? (fData.dob || "Not set") : "Locked / Private";
                profileModal.classList.remove('hidden');
            }
        });

        closeProfileBtn.addEventListener('click', () => profileModal.classList.add('hidden'));

        // Self Edit Settings Panel Overlay Operations Controllers
        openSettingsTrigger.addEventListener('click', () => {
            if(!currentUserData) return;
            editFirstName.value = currentUserData.firstName || "";
            editLastName.value = currentUserData.lastName || "";
            editUsername.value = currentUserData.username ? currentUserData.username.replace('@', '') : "";
            editDob.value = currentUserData.dob || "";
            editUsernameStatus.innerText = "";
            settingsModal.classList.remove('hidden');
        });

        closeSettingsBtn.addEventListener('click', () => settingsModal.classList.add('hidden'));

        editProfileForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fName = editFirstName.value.trim();
            const lName = editLastName.value.trim();
            const uName = editUsername.value.trim().toLowerCase().replace('@', '');
            const dOfBirth = editDob.value;
            const fFullName = `${fName} ${lName}`;

            try {
                const isAvailable = await checkUsernameLive(uName, editUsernameStatus);
                if(!isAvailable) throw new Error("username-taken");

                await updateDoc(doc(db, "users", auth.currentUser.uid), {
                    firstName: fName,
                    lastName: lName,
                    fullName: fFullName,
                    username: `@${uName}`,
                    dob: dOfBirth
                });

                await updateProfile(auth.currentUser, { displayName: fFullName });
                showToast("Profile settings updated instantly!", "success");
                settingsModal.classList.add('hidden');
            } catch(err) {
                showToast(err.message === "username-taken" ? "Username already taken!" : "Failed to update profile data", "error");
            }
        });
    </script>
</body>
</html>
